name: Build TestDPC

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Install ed
        run: sudo apt-get update && sudo apt-get install -y ed

      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Build TestDPC
        run: ./build.sh

      - name: Locate signed APK
        run: |
          set -e
          if [ ! -f bazel-bin/testdpc.apk ]; then
            echo "Expected bazel-bin/testdpc.apk not produced" >&2
            ls -R bazel-bin || true
            exit 1
          fi
          cp bazel-bin/testdpc.apk testdpc.apk

      - name: Compute signing-cert SHA-256 (URL-safe base64)
        id: hash
        run: |
          set -e
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found in build-tools" >&2
            exit 1
          fi
          HEX="$("$APKSIGNER" verify --print-certs testdpc.apk \
            | awk -F': ' '/Signer #1 certificate SHA-256 digest/ {print $2; exit}')"
          if [ -z "$HEX" ]; then
            echo "Could not extract signer certificate SHA-256" >&2
            "$APKSIGNER" verify --print-certs testdpc.apk
            exit 1
          fi
          SHA="$(printf '%s' "$HEX" | xxd -r -p | openssl base64 -A | tr '+/' '-_' | tr -d '=')"
          echo "sha256_url_safe=$SHA" >> "$GITHUB_OUTPUT"
          echo "Signing-cert SHA-256 (URL-safe base64) = $SHA"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: testdpc-apk
          path: testdpc.apk

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: testdpc.apk
          body: |
            Automated build of TestDPC. The APK is signed with Bazel's built-in
            debug keystore — that signature is stable across builds, so the
            checksum below remains valid for every release as long as Bazel
            doesn't change its bundled debug key.

            **Signing-cert SHA-256 (URL-safe base64) — paste into the QR code's `android.app.extra.PROVISIONING_DEVICE_ADMIN_SIGNATURE_CHECKSUM` field:**
            ```
            ${{ steps.hash.outputs.sha256_url_safe }}
            ```

            **Download URL — paste into `android.app.extra.PROVISIONING_DEVICE_ADMIN_PACKAGE_DOWNLOAD_LOCATION`:**
            ```
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/testdpc.apk
            ```
